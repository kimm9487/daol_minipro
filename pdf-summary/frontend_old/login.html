<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Summary 서비스 - 로그인</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-color: #f4f7f6;
        }

        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-container {
            background-color: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #666;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box; /* 패딩 포함 크기 조절 */
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #357abd;
        }

        .footer-links {
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
            color: #888;
        }

        .footer-links a {
            color: var(--primary-color);
            text-decoration: none;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="login-container">
    <h2>PDF Summary</h2>
    <form id="loginForm">
        <div class="form-group">
            <label for="user_id">아이디</label>
            <input type="text" id="user_id" name="user_id" placeholder="아이디를 입력하세요" required>
        </div>
        <div class="form-group">
            <label for="user_pw">비밀번호</label>
            <input type="password" id="user_pw" name="user_pw" placeholder="비밀번호를 입력하세요" required>
        </div>
        <button type="submit">로그인</button>
    </form>

    <div class="footer-links">
        계정이 없으신가요? <a href="register.html">회원가입</a>
    </div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const formData = new FormData();
    formData.append('user_id', document.getElementById('user_id').value);
    formData.append('user_pw', document.getElementById('user_pw').value);
    
    try {
        const response = await fetch('http://localhost:8000/auth/login', {
            method: 'POST',
            body: formData
        });
        
        if (response.ok) {
            const result = await response.json();
            
            // 로그인 정보를 localStorage에 저장
            localStorage.setItem('user_name', result.user_name);
            localStorage.setItem('user_id', result.user_id);
            localStorage.setItem('user_db_id', result.user_db_id);
            
            // 사용자 역할에 따라 리다이렉트
            if (result.user_id === 'admin') {
                window.location.href = 'admin.html';
            } else {
                window.location.href = 'index.html';
            }
        } else {
            const error = await response.json();
            alert('로그인 실패: ' + (error.detail || '알 수 없는 오류'));
        }
    } catch (error) {
        console.error('로그인 오류:', error);
        alert('서버 연결에 실패했습니다. 서버가 실행 중인지 확인하세요.');
    }
});
</script>
